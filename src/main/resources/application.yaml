spring:
  application:
    name: bdPsicologiaApp

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

# Render/Docker: hay que escuchar en todas las interfaces; si no, el health check no ve el puerto.
server:
  port: ${PORT:8080}
  address: 0.0.0.0

# Swagger/OpenAPI solo en perfil "dev" (ver application-dev.yaml)
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Fotos de perfil en disco (en PaaS sin volumen persisten solo hasta el redeploy).
# APP_URL_PUBLICA_BASE: origen público del API (p. ej. https://tu-servicio.onrender.com) sin barra final.
app:
  fotos-perfil:
    directorio: ${APP_FOTOS_PERFIL_DIR:uploads/perfiles}
    url-publica-base: ${APP_URL_PUBLICA_BASE:http://localhost:8080}
