# Variables útiles en Render (además de FIREBASE_CREDENTIALS):
# FIREBASE_PROJECT_ID — opcional; si falta se toma "project_id" del JSON de credenciales.
# Debe coincidir con el proyecto del cliente (p. ej. aud del JWT = app-psicologia-bb226).

spring:
  application:
    name: bdPsicologiaApp

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.EmbeddedDatabaseAutoConfiguration
      - org.springframework.boot.autoconfigure.h2.H2ConsoleAutoConfiguration

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

# Render/Docker: hay que escuchar en todas las interfaces; si no, el health check no ve el puerto.
server:
  port: ${PORT:8080}
  address: 0.0.0.0
  # Tras proxy (Render, etc.): scheme/host/puerto públicos en HttpServletRequest
  forward-headers-strategy: framework

# Swagger/OpenAPI solo en perfil "dev" (ver application-dev.yaml)
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Fotos de perfil en disco (en PaaS sin volumen persisten solo hasta el redeploy).
# APP_URL_PUBLICA_BASE: origen público del API (p. ej. https://tu-servicio.onrender.com) sin barra final.
app:
  fotos-perfil:
    directorio: ${APP_FOTOS_PERFIL_DIR:uploads/perfiles}
    url-publica-base: ${APP_URL_PUBLICA_BASE:http://localhost:8080}

# Integración con Groq para resumen IA de notas de paciente y detección de riesgo.
# GROQ_API_KEY es OBLIGATORIO en producción; si está vacío, el endpoint /resumen-ia responde 503
# y la detección automática de riesgo queda deshabilitada silenciosamente (no rompe la creación
# de notas). La API key NUNCA debe llegar al cliente Android — vive solo aquí en el backend.
ia:
  groq:
    api-key: ${GROQ_API_KEY:}
    base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}
    modelo: ${GROQ_MODELO:llama-3.1-8b-instant}
    timeout-segundos: 25
    max-tokens: 600
    temperatura: 0.3
  # Detección automática de indicios de riesgo cuando el paciente crea/edita una nota.
  # Se ejecuta de forma asíncrona; nunca bloquea la respuesta HTTP al paciente.
  # El paciente NO ve ningún resultado; solo el psicólogo recibe un push si nivel = ALTO.
  riesgo:
    habilitado: ${IA_RIESGO_HABILITADO:true}
    ventana-dedupe-horas: ${IA_RIESGO_VENTANA_DEDUPE_HORAS:6}
    max-tokens: 300
    temperatura: 0.1
